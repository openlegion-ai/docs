<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80">
  <defs>
    <style>
      .icon { fill: #FFFFFF; }
      .text { fill: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 38px; font-weight: 700; letter-spacing: -0.5px; }
    </style>
  </defs>
  <!-- Shield icon with grid (security + fleet) -->
  <g transform="translate(8, 6)">
    <!-- Outer shield -->
    <path class="icon" d="M34 4 L60 16 L60 38 C60 54 48 64 34 70 C20 64 8 54 8 38 L8 16 Z" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round"/>
    <!-- Inner grid lines (fleet/containers) -->
    <line x1="34" y1="18" x2="34" y2="58" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="16" y1="36" x2="52" y2="36" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Four dots (agents in containers) -->
    <circle cx="25" cy="27" r="3.5" class="icon"/>
    <circle cx="43" cy="27" r="3.5" class="icon"/>
    <circle cx="25" cy="47" r="3.5" class="icon"/>
    <circle cx="43" cy="47" r="3.5" class="icon"/>
  </g>
  <!-- Wordmark -->
  <text x="82" y="54" class="text">OpenLegion</text>
</svg>
